authentication:
  strategies:

    oauth2_client_credentials:
      enabled: REDACTED
      grant_type: REDACTED
      token_url: "${ENV_VAR}"
      client_id: "${ENV_VAR}"
      client_secret: "${ENV_VAR}"
      default_scope: "${ENV_VAR}"
      token_cache:
        enabled: REDACTED
        backend: "${ENV_VAR}"
        connection_string: "${ENV_VAR}"
        ttl_buffer_seconds: REDACTED
      retry:
        max_attempts: REDACTED
        backoff_ms: REDACTED

    api_key:
      enabled: REDACTED
      header_name: "${ENV_VAR}"
      header_prefix: "${ENV_VAR}"
      key_ref: "${ENV_VAR}"
      rotation:
        enabled: "${ENV_VAR}"
        rotation_interval_days: REDACTED
        alert_before_expiry_days: REDACTED
        alert_target: "${ENV_VAR}"

    mtls:
      enabled: REDACTED
      cert_path: "${ENV_VAR}"
      key_path: "${ENV_VAR}"
      ca_cert_path: "${ENV_VAR}"
      verify_peer: REDACTED
      min_tls_version: REDACTED

    hmac_webhook:
      enabled: REDACTED
      algorithm: REDACTED
      secret_ref: "${ENV_VAR}"
      header_name: "${ENV_VAR}"
      timestamp_header: "${ENV_VAR}"
      max_timestamp_skew_seconds: REDACTED

secrets:
  backend: "${ENV_VAR}"
  config:
    region: "${ENV_VAR}"
    endpoint: "${ENV_VAR}"
    cache_ttl_seconds: REDACTED
    rotation_poll_interval_seconds: REDACTED

inbound:
  require_auth: REDACTED
  allowed_strategies: REDACTED
  jwt:
    issuer: "${ENV_VAR}"
    audience: "${ENV_VAR}"
    jwks_url: "${ENV_VAR}"
    jwks_cache_ttl_seconds: REDACTED
    algorithm: REDACTED
  tenant_claim_field: REDACTED
